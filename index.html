    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 450px; 
        }

        h1 { color: #252e39; margin-bottom: 20px; }
        
        /* The Survey Button */
        .form-button { 
            display: inline-block;
            background-color: #8e44ad; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2; 
            margin-top: 10px;
        }

        .form-button:hover { transform: scale(1.05); background-color: #732d91; }

        /* MODAL OVERLAY: Blocks access to the button below */
        #cookie-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Darkens everything else */
            display: none; /* Shown via JS */
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* The actual Banner Box */
        #cookie-banner { 
            background: #252e39; 
            color: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px;
            width: 85%;
        }

        #accept-btn { 
            background: #8e44ad; 
            color: white; 
            border: none; 
            padding: 12px 45px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            font-size: 1rem;
        }

        #accept-btn:hover { background: #a55ecd; }
    </style>

    <script>
        // Set the experimental cookies immediately on load
        document.cookie = "ExperimentID=GroupA; path=/; SameSite=Lax; Secure";
        document.cookie = "SessionToken=123456; path=/; SameSite=Lax; Secure"; 
    </script>   
</head>

    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5CRFW3PV"

    <div class="card">
        <h1>Computer Networks Project Site B</h1>
        <p>Thank you for participating in our academic study.</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScdsu7F7Fv0qF-Dnu9o8Y7F4IOHIZcUgb7vNEu5vzM8IAnrrA/viewform?usp=header" class="form-button">
            Start Experiment & Survey
        </a>
    </div>

    <div id="cookie-overlay">
        <div id="cookie-banner">
            <h2>Cookie Consent</h2>
            <p>This site uses cookies for our academic privacy study. By clicking accept, you agree to the storage of cookies on your device.</p>
            <button id="accept-btn">Accept & Start</button>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('cookie-overlay');
        const acceptBtn = document.getElementById('accept-btn');

        // Check if user already accepted
        if (!localStorage.getItem('study_consent_given')) {
            overlay.style.display = 'flex'; // This centers the banner and blocks the page
        }

        // Handle the Accept Click
        acceptBtn.onclick = function() {
            // 1. Hide the overlay to reveal the site
            overlay.style.display = 'none';
            
            // 2. Remember the choice
            localStorage.setItem('study_consent_given', 'true');

            // 3. Signal to Google Tag Manager
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'anonymous_accept'
            });

            console.log("Consent recorded. Experiment starting.");
        };
    </script>
</body>
