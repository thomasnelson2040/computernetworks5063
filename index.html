    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8f9fa; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 400px; 
            z-index: 1; /* Lower than banner */
        }

        .form-button { 
            display: inline-block;
            background-color: #8e44ad; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s; 
            margin-top: 20px;
        }

        .form-button:hover { transform: scale(1.05); background-color: #732d91; }
        
        /* FULL SCREEN OVERLAY */
        #cookie-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Darkens the background */
            display: none; /* Controlled by JS */
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Ensures it is on top of everything */
        }

        /* MODAL BANNER */
        #cookie-banner { 
            background: #252e39; 
            color: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 400px;
            width: 80%;
        }

        #accept-btn { 
            background: #8e44ad; 
            color: white; 
            border: none; 
            padding: 12px 40px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
            font-size: 1rem;
        }

        #accept-btn:hover { background: #732d91; }
    </style>

    <div id="cookie-overlay">
        <div id="cookie-banner">
            <h3>Cookie Consent</h3>
            <p>This site uses cookies for our academic privacy study. You must accept to proceed with the experiment.</p>
            <button id="accept-btn">Accept & Continue</button>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('cookie-overlay');
        const acceptBtn = document.getElementById('accept-btn');

        // Check if user already accepted
        if (!localStorage.getItem('study_consent_given')) {
            overlay.style.display = 'flex'; // Show the modal
        }

        // Handle the Accept Click
        acceptBtn.onclick = function() {
            // 1. Hide the overlay
            overlay.style.display = 'none';
            
            // 2. Remember the choice locally
            localStorage.setItem('study_consent_given', 'true');

            // 3. Send signal to GTM
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'anonymous_accept'
            });

            console.log("Consent granted. GTM signal sent.");
        };
    </script>
