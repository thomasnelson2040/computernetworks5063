<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking Research Study - Site B</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 450px; 
        }
        h1 { color: #252e39; margin-bottom: 20px; }
        .form-button { 
            display: inline-block;
            background-color: #8e44ad; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.2s; 
            margin-top: 10px;
        }
        .form-button:hover { transform: scale(1.05); background-color: #732d91; }
        #cookie-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #cookie-banner { 
            background: #252e39; 
            color: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px;
            width: 85%;
        }
        #accept-btn { 
            background: #8e44ad; 
            color: white; 
            border: none; 
            padding: 12px 45px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            font-size: 1rem;
        }
        #accept-btn:hover { background: #a55ecd; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Computer Networks Project Site B</h1>
        <p>Thank you for participating in our academic study.</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSei_5WAkrgcbYOjaIN_yjbdmLPTZPCgtkKgWjhDgj4Q_aLN3w/viewform?usp=header" class="form-button">
            Start Experiment & Survey
        </a>
    </div>

    <div id="cookie-overlay">
        <div id="cookie-banner">
            <h2>Cookie Consent</h2>
            <p>This site uses cookies for our academic privacy study. By clicking accept, you agree to the storage of cookies on your device.</p>
            <button id="accept-btn">Accept & Start</button>
        </div>
    </div>

<script>
    const overlay = document.getElementById('cookie-overlay');
    const acceptBtn = document.getElementById('accept-btn');

    // 1. Check if user already accepted
    if (!localStorage.getItem('study_consent_given')) {
        overlay.style.display = 'flex'; 
    } else {
        // If already accepted, load analytics immediately
        loadAnalytics();
    }

    function generateSessionID() {
        return 'ID-' + Math.random().toString(36).substr(2, 9);
    }

    // 2. THE TRIGGER: Only runs when button is clicked
    acceptBtn.onclick = function() {
        overlay.style.display = 'none';
        localStorage.setItem('study_consent_given', 'true');

        const newID = generateSessionID();
        const expID = "SiteB_Accepted";

        // Set browser cookies (Response Header simulation) [cite: 132, 140]
        document.cookie = "ExperimentID=" + expID + "; path=/; SameSite=Lax; Secure";
        document.cookie = "SessionToken=" + newID + "; path=/; SameSite=Lax; Secure";

        // Load analytics scripts dynamically ONLY NOW
        loadAnalytics(newID);
    };

    function loadAnalytics(participantID) {
        // A. Load Google Analytics (gtag.js)
        const gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = "https://www.googletagmanager.com/gtag/js?id=G-7S3VX96XH7";
        document.head.appendChild(gaScript);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-7S3VX96XH7');

        // B. Load Google Tag Manager
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-5CRFW3PV');

        // C. Send Custom Event to dataLayer
        window.dataLayer.push({
            'event': 'anonymous_accept',
            'participant_id': participantID || 'returning_user'
        });

        console.log("Application Layer: Tracking Scripts Loaded Programmatically.");
    }
</script>
</body>
</html>
