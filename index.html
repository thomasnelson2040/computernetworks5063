    <!-- The Cookie Banner -->
    <div id="cookie-banner">
        <p>This site uses cookies for our academic privacy study.</p>
        <button id="accept-btn">Accept</button>
    </div>

    <script>
        // Check if user already accepted
        if (!localStorage.getItem('study_consent_given')) {
            document.getElementById('cookie-banner').style.display = 'block';
        }

        // Handle the Accept Click
        document.getElementById('accept-btn').onclick = function() {
            // 1. Hide the banner
            document.getElementById('cookie-banner').style.display = 'none';
            
            // 2. Remember the choice locally
            localStorage.setItem('study_consent_given', 'true');

            // 3. DIRECTLY tell GTM that the user accepted (No postMessage needed!)
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': 'anonymous_accept'
            });

            console.log("GTM signal 'anonymous_accept' has been sent.");
        };
    </script>
